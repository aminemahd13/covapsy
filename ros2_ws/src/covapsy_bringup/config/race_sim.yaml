scan_filter_node:
  ros__parameters:
    min_range_m: 0.05
    max_range_m: 8.0
    median_window: 5

reactive_driver_node:
  ros__parameters:
    min_speed_mps: 0.2
    max_speed_mps: 1.5
    corridor_centering_gain: 0.10

pure_pursuit_node:
  ros__parameters:
    speed_min_mps: 0.35
    speed_max_mps: 2.4
    lookahead_min_m: 0.42
    lookahead_max_m: 1.55
    curvature_speed_gain: 0.72
    speed_hint_scale: 1.5
    speed_hint_influence: 0.3
    lat_accel_limit_mps2: 3.8
    speed_ttc_target_s: 0.95
    speed_accel_limit_mps2: 2.8
    speed_decel_limit_mps2: 5.0
    curvature_window_pts: 10

mode_controller_node:
  ros__parameters:
    start_mode: RACE
    race_speed_cap_mps: 2.3
    learn_speed_cap_mps: 0.8
    race_entry_quality_threshold: 0.7
    race_entry_min_smoothness: 0.0
    race_entry_max_spacing_stddev: 0.03
    race_entry_max_closure_error_m: 0.2
    auto_switch_learn_to_race: true
    race_obstacle_avoidance_enabled: true
    race_reactive_blend_clearance_m: 0.42
    race_ttc_target_s: 0.95
    race_ttc_min_speed_mps: 0.35
    race_side_slowdown_clearance_m: 0.18
    race_side_critical_clearance_m: 0.11
    race_overlay_steer_slew_rad_s: 5.0
    race_overlay_speed_slew_mps2: 4.0
    front_blocked_m: 0.21
    safety_steer_veto_clearance_m: 0.24
    stuck_cycles: 15
    odom_progress_window_s: 1.0
    odom_min_displacement_m: 0.02

track_learner_node:
  ros__parameters:
    min_quality: 0.7
    speed_profile_max_mps: 1.35
    speed_profile_curvature_gain: 0.6
    track_store_path: /home/amine/Desktop/covapsy/track/track_sim.json
    auto_save_on_valid: true
    freeze_after_valid: true

stm32_bridge_node:
  ros__parameters:
    competition_mode: false
    require_start_signal: false

scan_filter_node:
  ros__parameters:
    min_range_m: 0.05
    max_range_m: 8.0
    median_window: 5

reactive_driver_node:
  ros__parameters:
    min_speed_mps: 0.2
    max_speed_mps: 1.0
    corridor_centering_gain: 0.10

pure_pursuit_node:
  ros__parameters:
    speed_min_mps: 0.25
    speed_max_mps: 1.7
    lookahead_min_m: 0.35
    lookahead_max_m: 1.2

mode_controller_node:
  ros__parameters:
    start_mode: RACE
    race_speed_cap_mps: 1.7
    learn_speed_cap_mps: 0.8
    race_entry_quality_threshold: 0.5
    front_blocked_m: 0.22
    safety_steer_veto_clearance_m: 0.3
    stuck_cycles: 15
    odom_progress_window_s: 1.0
    odom_min_displacement_m: 0.02

track_learner_node:
  ros__parameters:
    min_quality: 0.5
    speed_profile_max_mps: 0.8
    speed_profile_curvature_gain: 0.6
    track_store_path: /tmp/covapsy_track_sim.json
    auto_save_on_valid: true

stm32_bridge_node:
  ros__parameters:
    competition_mode: false
    require_start_signal: false

scan_filter_node:
  ros__parameters:
    min_range_m: 0.05
    max_range_m: 6.0
    median_window: 5

reactive_driver_node:
  ros__parameters:
    min_speed_mps: 0.12
    max_speed_mps: 0.5
    ttc_limit_s: 1.2
    steer_slew_rad_s: 2.0
    corridor_centering_gain: 0.12

mode_controller_node:
  ros__parameters:
    start_mode: LEARN
    learn_speed_cap_mps: 0.45
    race_speed_cap_mps: 0.7
    race_entry_quality_threshold: 0.78
    auto_switch_learn_to_race: false
    race_obstacle_avoidance_enabled: true
    race_reactive_blend_clearance_m: 0.3
    wrong_way_recovery_conf: 0.8
    stuck_cycles: 18
    odom_progress_window_s: 1.2
    odom_min_displacement_m: 0.015

direction_detector_node:
  ros__parameters:
    image_topic: /camera/color/image_raw
    scan_topic: /scan_filtered

track_learner_node:
  ros__parameters:
    min_samples: 320
    min_quality: 0.78
    speed_profile_max_mps: 0.4
    speed_profile_curvature_gain: 0.7
    track_store_path: "track/track_real.json"
    auto_save_on_valid: true
    freeze_after_valid: false
    max_backups: 5

stm32_bridge_node:
  ros__parameters:
    competition_mode: true
    require_start_signal: true
    allow_restart_after_stop: false
    serial_device: /dev/stm32_mcu
    serial_baud: 115200
    serial_open_retry_s: 1.0
    telemetry_timeout_s: 0.25
    watchdog_timeout_s: 0.25
    lcd_enabled: true
    lcd_update_hz: 5.0
    lcd_page_period_s: 2.0
    external_steering_mode: true
    max_speed_mps: 1.0
    max_steer_rad: 0.42

dynamixel_steering_node:
  ros__parameters:
    require_start_signal: true
    allow_restart_after_stop: false
    serial_device: /dev/waveshare_servo
    baud_rate: 57600
    serial_open_retry_s: 1.0
    protocol_version: 2.0
    dxl_id: 1
    center_tick: 2048
    left_tick: 2560
    right_tick: 1536
    max_steer_rad: 0.42
    watchdog_timeout_s: 0.25
    publish_present_position: true

stm32_bridge:
  ros__parameters:
    # Backend selection: spi | uart | pi_pwm
    backend: spi
    watchdog_timeout: 0.25

    # Competition control contract:
    # - bridge accepts motion commands only from cmd_topic
    # - /race_start arms command acceptance
    # - /race_stop latches stop (no restart in same run)
    cmd_topic: /cmd_vel_autonomy
    competition_mode: true
    require_start_signal: true
    allow_restart_after_stop: false

    # Common drive limits
    max_steering_deg: 18.0
    max_speed_fwd: 2.0
    max_speed_rev: -4.0

    # UART backend
    uart_port: /dev/ttyAMA0
    uart_baudrate: 115200

    # SPI backend (6-byte frame)
    spi_bus: 0
    spi_device: 1
    spi_speed_hz: 1000000
    spi_mode: 0
    spi_header_0: 85
    spi_header_1: 85
    spi_steering_index: 2
    spi_speed_index: 3
    spi_flags_index: 4

    # pi_pwm backend (Hat jumpers routed to RPi)
    pwm_hz: 50
    pwm_prop_channel: 0
    pwm_dir_channel: 1
    pwm_prop_stop: 7.5
    pwm_prop_deadband: 0.56
    pwm_prop_delta_max: 1.0
    pwm_speed_hard: 8.0
    pwm_direction_sign: -1.0
    pwm_angle_deg_max: 18.0
    pwm_angle_min: 5.5
    pwm_angle_max: 9.3
    pwm_angle_center: 7.4
